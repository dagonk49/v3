services:
  dagzflix:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dagzflix_web-V2
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      - NODE_ENV=production
      # N'oublie pas de mettre tes vraies URL dans ce fichier ou dans un .env
      - MONGO_URL=mongodb://192.168.1.232:27017
      - DB_NAME=dagzflix
      - APP_ORIGIN=http://192.168.1.232:4001